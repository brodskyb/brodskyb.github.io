<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <meta name="description" content="about brandon brodsky and brodskyb dev."/>
        <title>about | brodskyb dev</title>
        <link rel="icon" type="image/png" href="/images/favicon.png" />
        <link rel="stylesheet" href="/styles.css?v=20260530-2"/>
    </head>
    <body>
        <header class="site-header" aria-label="Primary navigation">
            <nav class="nav">
                <a class="brand" href="/" aria-label="brodskyb dev home">brodskyb dev</a>
                <div class="tabs" aria-label="Site tabs">
                    <a href="/">home</a>
                    <a href="/apps/">apps</a>
                    <a href="/about/" aria-current="page">about</a>
                    <a href="/contact/">contact</a>
                </div>
            </nav>
        </header>
        <main>
            <section class="page about-page">
                <p class="eyebrow">scratchpad</p>
                <h1>About</h1>
                <article class="scratchpad" aria-label="random thoughts and comments">
                    <pre id="scratchpad-content">Loading scratchpad...</pre>
                    <noscript>
                        <p><a class="text-link" href="/about/scratchpad.txt">Open the scratchpad text file</a></p>
                    </noscript>
                </article>
            </section>
        </main>
        <footer class="site-footer">
            <span>&copy; 2026 Brandon Brodsky</span>
        </footer>
        <script>
            const scratchpad = document.getElementById("scratchpad-content");

            fetch(`/about/scratchpad.txt?v=${Date.now()}`)
                .then((response) => {
                    if (!response.ok) {
                        throw new Error("Scratchpad not found");
                    }

                    return response.text();
                })
                .then((text) => {
                    scratchpad.textContent = text.trim();
                })
                .catch(() => {
                    scratchpad.textContent = "Could not load the scratchpad right now.";
                });
        </script>
    </body>
</html>
